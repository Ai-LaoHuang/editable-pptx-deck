<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F6F1E8"/>
  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <text x="72" y="72" font-size="15" fill="#6C7A63" font-weight="700">05 / 上新节奏</text>
    <text x="72" y="142" font-size="46" fill="#1F241F" font-weight="800">4 周完成从种草到复购</text>
    <text x="72" y="188" font-size="20" fill="#6B655C">不是一天爆发，而是用连续触点把新品变成用户习惯。</text>
    <line x1="124" y1="352" x2="1130" y2="352" stroke="#1F241F" stroke-width="3"/>
    <g>
      <circle cx="220" cy="352" r="30" fill="#6C7A63"/>
      <text x="220" y="359" text-anchor="middle" font-size="18" fill="#F6F1E8" font-weight="800">W1</text>
      <text x="160" y="430" font-size="22" fill="#1F241F" font-weight="800">预热种草</text>
      <text x="140" y="466" font-size="16" fill="#6B655C">新品暗示 / 门店光影</text>
      <circle cx="500" cy="352" r="30" fill="#B7A27A"/>
      <text x="500" y="359" text-anchor="middle" font-size="18" fill="#F6F1E8" font-weight="800">W2</text>
      <text x="440" y="430" font-size="22" fill="#1F241F" font-weight="800">上市爆发</text>
      <text x="420" y="466" font-size="16" fill="#6B655C">首杯价 / 达人开箱</text>
      <circle cx="780" cy="352" r="30" fill="#8A6F52"/>
      <text x="780" y="359" text-anchor="middle" font-size="18" fill="#F6F1E8" font-weight="800">W3</text>
      <text x="720" y="430" font-size="22" fill="#1F241F" font-weight="800">社交扩散</text>
      <text x="696" y="466" font-size="16" fill="#6B655C">UGC 打卡 / 双杯套餐</text>
      <circle cx="1060" cy="352" r="30" fill="#1F241F"/>
      <text x="1060" y="359" text-anchor="middle" font-size="18" fill="#F6F1E8" font-weight="800">W4</text>
      <text x="1000" y="430" font-size="22" fill="#1F241F" font-weight="800">复购沉淀</text>
      <text x="974" y="466" font-size="16" fill="#6B655C">会员券 / 第二杯权益</text>
    </g>
    <rect x="72" y="594" width="1108" height="1" fill="#D8D0C1"/>
    <text x="72" y="640" font-size="17" fill="#6B655C">节奏原则：每周只强化一个动作，避免内容、渠道和门店执行互相抢戏。</text>
  </g>
</svg>
