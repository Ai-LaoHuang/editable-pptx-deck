      <text x="330" y="354" font-size="16" fill="#6B655C">第二杯券</text>
      <line x1="520" y1="226" x2="520" y2="478" stroke="#D8D0C1" stroke-width="1"/>
      <text x="570" y="252" font-size="24" fill="#1F241F" font-weight="800">到店外卖</text>
